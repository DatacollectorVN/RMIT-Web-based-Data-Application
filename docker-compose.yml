services:
  postgres:
    image: postgres:16-alpine
    container_name: rmit-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rmit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rmit}
      POSTGRES_DB: ${POSTGRES_DB:-rmit}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rmit} -d ${POSTGRES_DB:-rmit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: rmit-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rmit-app
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override host-side localhost URLs with container-internal service names.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rmit}:${POSTGRES_PASSWORD:-rmit}@postgres:5432/${POSTGRES_DB:-rmit}
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX_PRODUCTS: ${OPENSEARCH_INDEX_PRODUCTS:-products}
      # Writable storage for product images; same path as PRODUCT_PHOTOS_DIR in .env.example
      PRODUCT_PHOTOS_DIR: /var/lib/beauty-app/product-photos
    volumes:
      # Bind mount: persists on the EC2 host under ./data/product-photos; share with API only.
      - ./data/product-photos:/var/lib/beauty-app/product-photos
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_HOST: ${VITE_API_HOST:-http://localhost:8080}
    container_name: rmit-ui
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres-data:
  opensearch-data:
