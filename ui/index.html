<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty App — Add Product</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      color: #555;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    .card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid .full { grid-column: 1 / -1; }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #444;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      padding: 10px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,.15);
    }

    textarea { resize: vertical; min-height: 90px; }

    /* File drop zone */
    .drop-zone {
      border: 2px dashed #d2d2d7;
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone.dragover {
      border-color: #0071e3;
      background: #f0f7ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone .drop-label { font-size: 0.875rem; color: #666; pointer-events: none; }
    .drop-zone .drop-label strong { color: #0071e3; }

    #preview-wrap { margin-top: 12px; display: none; }
    #preview-wrap img {
      max-height: 180px;
      border-radius: 8px;
      border: 1px solid #e5e5e5;
    }

    /* API URL row */
    .api-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .api-row label {
      font-size: 0.8rem;
      color: #666;
      white-space: nowrap;
    }

    .api-row input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: monospace;
    }

    /* Submit button */
    .btn-submit {
      margin-top: 24px;
      width: 100%;
      padding: 13px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-submit:hover { background: #005bbf; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { background: #a0c4e8; cursor: not-allowed; }

    /* Result panel */
    .result-card {
      width: 100%;
      max-width: 680px;
      margin-top: 24px;
      border-radius: 16px;
      padding: 24px;
      display: none;
    }

    .result-card.success { background: #e8f5e9; border: 1px solid #a5d6a7; }
    .result-card.error   { background: #fdecea; border: 1px solid #f5a7a5; }

    .result-card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .result-card.success h3 { color: #2e7d32; }
    .result-card.error h3   { color: #c62828; }

    .product-preview {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-top: 12px;
    }

    .product-preview img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ddd;
      flex-shrink: 0;
    }

    .product-preview .no-photo {
      width: 110px;
      height: 110px;
      border-radius: 10px;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #999;
      flex-shrink: 0;
    }

    .product-info { display: flex; flex-direction: column; gap: 4px; }
    .product-info .pi-name { font-weight: 600; font-size: 1rem; }
    .product-info .pi-brand { color: #555; font-size: 0.85rem; }
    .product-info .pi-price { font-weight: 700; color: #2e7d32; margin-top: 4px; }
    .product-info .pi-id { font-size: 0.75rem; color: #999; margin-top: 6px; font-family: monospace; }

    pre.json-dump {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      overflow-x: auto;
      margin-top: 14px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <header>
    <h1>Beauty App</h1>
    <p>Add a new product with an optional primary photo.</p>
  </header>

  <div class="card">
    <h2>Add Product</h2>

    <div class="api-row">
      <label for="apiBase">API base</label>
      <input id="apiBase" type="text" value="http://localhost:8080" spellcheck="false" />
    </div>

    <form id="productForm">
      <div class="form-grid">

        <label>
          Brand *
          <input type="text" name="brand" placeholder="e.g. L'Oréal" required />
        </label>

        <label>
          Category *
          <input type="text" name="category" placeholder="e.g. skincare" required />
        </label>

        <label class="full">
          Product name *
          <input type="text" name="name" placeholder="e.g. Revitalift Moisturiser" required />
        </label>

        <label class="full">
          Description *
          <textarea name="description" placeholder="What makes this product special?" required></textarea>
        </label>

        <label>
          Price (USD) *
          <input type="number" name="price" placeholder="29.99" min="0.01" step="0.01" required />
        </label>

        <label>
          &nbsp;<!-- spacer -->
        </label>

        <label class="full">
          Product photo (optional)
          <div class="drop-zone" id="dropZone">
            <input type="file" name="file" id="fileInput" accept="image/*" />
            <p class="drop-label">
              <strong>Click to browse</strong> or drag & drop an image here
            </p>
          </div>
          <div id="preview-wrap">
            <img id="imgPreview" src="" alt="preview" />
          </div>
        </label>

      </div><!-- /form-grid -->

      <button class="btn-submit" type="submit" id="submitBtn">Add Product</button>
    </form>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <h3 id="resultTitle"></h3>
    <div class="product-preview" id="productPreview"></div>
    <pre class="json-dump" id="jsonDump"></pre>
  </div>

  <script>
    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const previewWrap = document.getElementById('preview-wrap');
    const imgPreview = document.getElementById('imgPreview');

    // Drag-and-drop styling
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        fileInput.files = e.dataTransfer.files;
        showPreview(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) showPreview(fileInput.files[0]);
    });

    function showPreview(file) {
      const reader = new FileReader();
      reader.onload = e => {
        imgPreview.src = e.target.result;
        previewWrap.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    // Form submit
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Adding…';

      const apiBase = document.getElementById('apiBase').value.replace(/\/$/, '');
      const form = e.target;
      const fd = new FormData(form);

      // If no file selected, remove the key so the server sees None
      if (!fileInput.files[0]) fd.delete('file');

      const resultCard = document.getElementById('resultCard');
      resultCard.style.display = 'none';
      resultCard.className = 'result-card';

      try {
        const res = await fetch(`${apiBase}/api/v1/products/add-product`, {
          method: 'POST',
          body: fd,
        });

        const json = await res.json();
        resultCard.style.display = 'block';

        if (res.ok) {
          resultCard.classList.add('success');
          document.getElementById('resultTitle').textContent = '✓ Product created successfully';
          renderProductPreview(json.data, apiBase);
        } else {
          resultCard.classList.add('error');
          document.getElementById('resultTitle').textContent = `✗ Error ${res.status}`;
          document.getElementById('productPreview').innerHTML = '';
        }

        document.getElementById('jsonDump').textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        resultCard.style.display = 'block';
        resultCard.classList.add('error');
        document.getElementById('resultTitle').textContent = '✗ Network error';
        document.getElementById('productPreview').innerHTML = '';
        document.getElementById('jsonDump').textContent = String(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Add Product';
      }
    });

    function renderProductPreview(product, apiBase) {
      const photo = product.photos && product.photos[0];
      const imgEl = photo
        ? `<img src="${apiBase}${photo.url}" alt="${product.name}" />`
        : `<div class="no-photo">No photo</div>`;

      document.getElementById('productPreview').innerHTML = `
        ${imgEl}
        <div class="product-info">
          <span class="pi-name">${product.name}</span>
          <span class="pi-brand">${product.brand}</span>
          <span class="pi-price">$${Number(product.price).toFixed(2)}</span>
          <span class="pi-id">ID: ${product.id} · ${product.category}</span>
        </div>
      `;
    }
  </script>

</body>
</html>
